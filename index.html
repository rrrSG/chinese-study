};

let currentSet = 6;
let sentences = setData[6].sentences;
let currentPatterns = setData[6].patterns;
let stopRequested = false;
let startLang = 'zh'; // 'zh' or 'en' - which language plays first

function setStartLang(lang) {
  startLang = lang;
  document.getElementById('orderZH').classList.toggle('active', lang === 'zh');
  document.getElementById('orderEN').classList.toggle('active', lang === 'en');
}

// 중국어 텍스트 토글 (탭하면 보이고/숨김)
function toggleHidden(el) {
  el.classList.toggle('hidden');
}

// 전체 보기 / 가리기
function showAll() {
  document.querySelectorAll('.chinese, .english, .korean, .pinyin, .note-words, .note-grammar')
    .forEach(el => el.classList.remove('hidden'));
}
function hideAll() {
  document.querySelectorAll('.chinese, .english, .korean, .pinyin, .note-words, .note-grammar')
    .forEach(el => el.classList.add('hidden'));
}

function switchSet(setNum) {
  stopAll();
  currentSet = setNum;
  sentences = setData[setNum].sentences;
  currentPatterns = setData[setNum].patterns;
  [1, 2, 3, 4, 5, 6].forEach(n => {
    const tab = document.getElementById(`tab-${n}`);
    if (tab) tab.classList.toggle('active', n === setNum);
  });
  document.getElementById('setInfo').innerHTML = decodeHTML(setData[setNum].info);
  renderCards();
  renderPatterns();
  setStatus(`Set ${setNum} 준비 완료. ▶️ 전체 재생을 눌러보세요!`);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCards() {
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  sentences.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <span class="stage-badge zh">🇨🇳 중국어</span>
      <span class="stage-badge wait">⏳ 대기 중</span>
      <span class="stage-badge en">🇬🇧 영어</span>
      <div class="card-header">
        <span class="card-num">#${i + 1}</span>
        <div class="play-buttons">
          <button onclick="speakOne(${i}, 'zh')">🇨🇳 중</button>
          <button onclick="speakOne(${i}, 'en')">🇬🇧 영</button>
          <button onclick="playPair(${i})">🔁 짝</button>
        </div>
      </div>
      <div class="chinese hidden" onclick="toggleHidden(this)">${s.zh}</div>
      <div class="english hidden" onclick="toggleHidden(this)">${s.en}</div>
      <div class="korean hidden" onclick="toggleHidden(this)">${s.ko}</div>
      <div class="pinyin hidden" onclick="toggleHidden(this)">${s.py}</div>
      <div class="card-extra">
        <div class="card-extra-label">📦 단어 매칭</div>
        <div class="note-words hidden" onclick="toggleHidden(this)">${s.words}</div>
        <div class="card-extra-label">💡 문법 설명</div>
        <div class="note-grammar hidden" onclick="toggleHidden(this)">${decodeHTML(s.grammar)}</div>
      </div>
    `;
    cardsEl.appendChild(card);
  });
}

// HTML 엔티티를 실제 태그로 변환 (innerHTML 사용 시 bold/code가 제대로 보이게)
function decodeHTML(str) {
  if (!str) return '';
  var s = String(str);
  // 문자열 치환 사용 (정규식 대신 안전하게)
  while (s.indexOf('&lt;b&gt;') !== -1) s = s.replace('&lt;b&gt;', '\u003Cb\u003E');
  while (s.indexOf('&lt;/b&gt;') !== -1) s = s.replace('&lt;/b&gt;', '\u003C/b\u003E');
  while (s.indexOf('&lt;code&gt;') !== -1) s = s.replace('&lt;code&gt;', '\u003Ccode\u003E');
  while (s.indexOf('&lt;/code&gt;') !== -1) s = s.replace('&lt;/code&gt;', '\u003C/code\u003E');
  while (s.indexOf('&lt;br&gt;') !== -1) s = s.replace('&lt;br&gt;', '\u003Cbr\u003E');
  while (s.indexOf('&lt;strong&gt;') !== -1) s = s.replace('&lt;strong&gt;', '\u003Cstrong\u003E');
  while (s.indexOf('&lt;/strong&gt;') !== -1) s = s.replace('&lt;/strong&gt;', '\u003C/strong\u003E');
  return s;
}

function renderPatterns() {
  const patternEl = document.getElementById('patternSummary');
  let html = '<div class="pattern-summary">';
  currentPatterns.forEach(p => {
    html += `<div class="pattern-item"><div class="pattern-name">${p.name}</div><div class="pattern-desc">${decodeHTML(p.desc)}</div></div>`;
  });
  html += '</div>';
  patternEl.innerHTML = html;
}

renderCards();
renderPatterns();

function setStatus(msg, mode = '') {
  const bar = document.getElementById('status');
  bar.innerHTML = msg;
  bar.className = 'status-bar' + (mode ? ' ' + mode : '');
}

function getVoice(langPrefix) {
  const voices = speechSynthesis.getVoices();
  const match = voices.find(v => v.lang.startsWith(langPrefix) && !v.default);
  return match || voices.find(v => v.lang.startsWith(langPrefix));
}

function speak(text, lang) {
  return new Promise((resolve) => {
    if (stopRequested) { resolve(); return; }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
    const voice = getVoice(lang === 'zh' ? 'zh' : 'en');
    if (voice) utter.voice = voice;
    utter.rate = parseFloat(document.getElementById('speedSelect').value);
    utter.pitch = 1.0; utter.volume = 1.0;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    speechSynthesis.speak(utter);
  });
}

function waitWithCountdown(ms, cardIdx, progressText = '') {
  return new Promise((resolve) => {
    const card = document.getElementById(`card-${cardIdx}`);
    if (card) { card.classList.remove('playing-zh', 'playing-en'); card.classList.add('waiting'); }
    const totalSec = Math.ceil(ms / 1000);
    let remaining = totalSec;
    const tick = () => {
      if (stopRequested) { clearInterval(interval); resolve(); return; }
      setStatus(`${progressText}⏳ 의미를 떠올려보세요! <span class="countdown-big">${remaining}</span>`, 'wait');
      remaining--;
      if (remaining < 0) { clearInterval(interval); resolve(); }
    };
    tick();
    const interval = setInterval(tick, 1000);
  });
}

function setCardStage(i, stage) {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('playing-zh', 'playing-en', 'waiting');
  });
  if (i >= 0 && stage) {
    const card = document.getElementById(`card-${i}`);
    if (card) {
      if (stage === 'zh') card.classList.add('playing-zh');
      else if (stage === 'en') card.classList.add('playing-en');
      else if (stage === 'wait') card.classList.add('waiting');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

async function speakOne(i, lang) {
  // 새 패턴: 같은 언어 2번 + 매번 3초 대기
  // 반복 N회 = 2 × N 번 재생
  stopAll();
  await new Promise(r => setTimeout(r, 100));
  stopRequested = false;
  const repeat = parseInt(document.getElementById('repeatSelect').value);
  const pauseMs = parseInt(document.getElementById('pauseSelect').value);
  const langLabel = lang === 'zh' ? '🇨🇳 중국어' : '🇬🇧 영어';
  const totalPlays = repeat * 2;
  
  for (let p = 0; p < totalPlays; p++) {
    if (stopRequested) break;
    const playNum = `(${p + 1}/${totalPlays}) `;
    setCardStage(i, lang);
    setStatus(`${playNum}▶️ #${i + 1} ${langLabel}`, lang);
    await speak(sentences[i][lang], lang);
    if (stopRequested) break;
    // 매 재생 후 3초 대기 (마지막 재생 후에도)
    await waitWithCountdown(pauseMs, i, playNum);
  }
  setCardStage(-1);
  setStatus('✅ 완료!');
}

async function playPair(i) {
  // 새 패턴: 시작언어 2번 → 다른언어 2번 (사이마다 3초)
  // 반복 N회: 위 패턴이 N번 반복
  stopAll();
  await new Promise(r => setTimeout(r, 100));
  stopRequested = false;
  const repeat = parseInt(document.getElementById('repeatSelect').value);
  const pauseMs = parseInt(document.getElementById('pauseSelect').value);
  const firstLang = startLang;
  const secondLang = startLang === 'zh' ? 'en' : 'zh';
  const firstLabel = firstLang === 'zh' ? '🇨🇳 중국어' : '🇬🇧 영어';
  const secondLabel = secondLang === 'zh' ? '🇨🇳 중국어' : '🇬🇧 영어';
  
  for (let r = 0; r < repeat; r++) {
    if (stopRequested) break;
    const repeatText = repeat > 1 ? `(${r + 1}/${repeat}) ` : '';
    
    // 시작 언어 2번
    for (let p = 0; p < 2; p++) {
      if (stopRequested) break;
      setCardStage(i, firstLang);
      setStatus(`${repeatText}▶️ #${i + 1} · ${firstLabel} (${p + 1}/2)`, firstLang);
      await speak(sentences[i][firstLang], firstLang);
      if (stopRequested) break;
      await waitWithCountdown(pauseMs, i, `${repeatText}#${i + 1} · `);
    }
    if (stopRequested) break;
    
    // 다른 언어 2번
    for (let p = 0; p < 2; p++) {
      if (stopRequested) break;
      setCardStage(i, secondLang);
      setStatus(`${repeatText}▶️ #${i + 1} · ${secondLabel} (${p + 1}/2)`, secondLang);
      await speak(sentences[i][secondLang], secondLang);
      if (stopRequested) break;
      await waitWithCountdown(pauseMs, i, `${repeatText}#${i + 1} · `);
    }
  }
  setCardStage(-1);
  setStatus('✅ 완료!');
}

async function playAll() {
  // 새 패턴: 각 문장마다 [시작언어 2번 → 다른언어 2번] (사이마다 3초)
  // 반복 N회: 위 패턴이 N번 반복, 모든 문장 끝나도 3초 대기
  stopAll();
  await new Promise(r => setTimeout(r, 100));
  stopRequested = false;
  const repeat = parseInt(document.getElementById('repeatSelect').value);
  const pauseMs = parseInt(document.getElementById('pauseSelect').value);
  const firstLang = startLang;
  const secondLang = startLang === 'zh' ? 'en' : 'zh';
  const firstLabel = firstLang === 'zh' ? '🇨🇳 중국어' : '🇬🇧 영어';
  const secondLabel = secondLang === 'zh' ? '🇨🇳 중국어' : '🇬🇧 영어';
  
  for (let i = 0; i < sentences.length; i++) {
    if (stopRequested) break;
    const progressText = `[${i + 1}/${sentences.length}] `;
    
    for (let r = 0; r < repeat; r++) {
      if (stopRequested) break;
      const repeatText = repeat > 1 ? `(${r + 1}/${repeat}) ` : '';
      
      // 시작 언어 2번
      for (let p = 0; p < 2; p++) {
        if (stopRequested) break;
        setCardStage(i, firstLang);
        setStatus(`${progressText}${repeatText}${firstLabel} (${p + 1}/2)`, firstLang);
        await speak(sentences[i][firstLang], firstLang);
        if (stopRequested) break;
        await waitWithCountdown(pauseMs, i, `${progressText}${repeatText}`);
      }
      if (stopRequested) break;
      
      // 다른 언어 2번
      for (let p = 0; p < 2; p++) {
        if (stopRequested) break;
        setCardStage(i, secondLang);
        setStatus(`${progressText}${repeatText}${secondLabel} (${p + 1}/2)`, secondLang);
        await speak(sentences[i][secondLang], secondLang);
        if (stopRequested) break;
        // 마지막 문장의 마지막 반복의 마지막 재생도 3초 대기 (사용자 요청)
        await waitWithCountdown(pauseMs, i, `${progressText}${repeatText}`);
      }
    }
  }
  setCardStage(-1);
  setStatus(stopRequested ? '⏹ 정지됨' : '✅ 전체 재생 완료!');
}

function stopAll() {
  stopRequested = true;
  speechSynthesis.cancel();
  setCardStage(-1);
  setStatus('⏹ 정지됨');
}

if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
}
</script>
